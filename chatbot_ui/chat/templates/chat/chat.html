<!DOCTYPE html>
<html>
<head>
<title>FitBuddy – Your AI Fitness Coach</title>

<style>

body{
    margin:0;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    font-family:system-ui,-apple-system,Segoe UI,Roboto;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    width:650px;
    display:flex;
    flex-direction:column;
    height:92vh;
}

h2{
    text-align:center;
    margin-bottom:15px;
    font-weight:600;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:22px;
    border-radius:20px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.05);
    box-shadow:0 8px 40px rgba(0,0,0,0.4);
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* Message bubbles */

.message{
    display:inline-block;
    max-width:70%;
    padding:10px 14px;
    border-radius:16px;
    animation:fadeIn .25s ease;
    line-height:1.5;
    font-size:14px;
    word-wrap:break-word;
}

.user{
    align-self:flex-end;
    background:linear-gradient(135deg,#4f8cff,#2563eb);
    width:fit-content;
}

.bot{
    align-self:flex-start;
    background:#1f2937;
}

/* Markdown styling */

.bot ul{
    margin:6px 0 6px 18px;
    padding:0;
}

.bot li{
    margin-bottom:4px;
}

.bot strong{
    color:#60a5fa;
}

.bot h3{
    margin:8px 0;
}

.bot p{
    margin:4px 0;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(8px);}
    to{opacity:1;transform:translateY(0);}
}

/* typing animation */

.typing{
    font-style:italic;
    opacity:.7;
}

.typing::after{
    content:"";
    animation:dots 1.5s steps(3,end) infinite;
}

@keyframes dots{
    0%{content:"";}
    33%{content:".";}
    66%{content:"..";}
    100%{content:"...";}
}

form{
    margin-top:12px;
    display:flex;
}

input{
    flex:1;
    padding:14px;
    border-radius:12px;
    border:none;
    background:#1e293b;
    color:white;
    outline:none;
}

button{
    margin-left:10px;
    padding:14px 20px;
    border-radius:12px;
    border:none;
    background:#2563eb;
    color:white;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#1d4ed8;
}

.chat-box::-webkit-scrollbar{
    width:6px;
}

.chat-box::-webkit-scrollbar-thumb{
    background:#2563eb;
    border-radius:10px;
}

</style>

<!-- Markdown Parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

    <body>

    <div class="container">

    <h2>🤖 FitBuddy – Your AI Fitness Coach</h2>

    <div class="chat-box" id="chat-box"> {% for msg in messages %}

    <div class="message {{msg.role}}">{{msg.message}}

    </div>{% endfor %}</div>

        <form id="chat-form">
            <input type="text" id="message-input" placeholder="Ask about workouts, diet, fitness..." required>
            <button type="submit" id="send-btn">Send</button>
        </form>

    </div>

    <script>

    document.addEventListener("DOMContentLoaded",function(){

    const form=document.getElementById("chat-form");
    const input=document.getElementById("message-input");
    const chatBox=document.getElementById("chat-box");
    const sendBtn=document.getElementById("send-btn");

    chatBox.scrollTop=chatBox.scrollHeight;

    function renderMarkdown(text){

    if(!text) return "";

    text=text
    .replace(/\\n/g,"\n")
    .replace(/\*\*(.*?)\*\*/g,"**$1**");

    return marked.parse(text);
    }

    function addMessage(text,type,isTyping=false){

    const msg=document.createElement("div");
    msg.classList.add("message",type);

    if(isTyping){
        msg.classList.add("typing");
        msg.innerText=text;
        }
    else{
        msg.innerHTML=renderMarkdown(text);
    }

    chatBox.appendChild(msg);
    chatBox.scrollTop=chatBox.scrollHeight;

    return msg;
    }

    form.addEventListener("submit",function(e){

    e.preventDefault();

    const message=input.value.trim();
    if(!message) return;

    addMessage(message,"user");

    input.value="";
    sendBtn.disabled=true;

    const typingIndicator=addMessage("FitBuddy is typing","bot",true);

    // fetch("http://localhost:8000/chat",{
    fetch("https://chat-bot-jrpl.onrender.com/chat", {
        method:"POST",
        headers:{
        "Content-Type":"application/json"
    },

    body:JSON.stringify({
        user_id:"user1",
        question:message
    })

    })
    .then(res=>res.json())
    .then(data=>{

    typingIndicator.remove();

    addMessage(data.response,"bot");

    })
    .catch(()=>{

    typingIndicator.remove();

    addMessage("⚠️ Something went wrong.","bot");

    })
    .finally(()=>{

    sendBtn.disabled=false;

    });

    });

    input.addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        form.dispatchEvent(new Event("submit"));
    }
    });

    });

    </script>

    </body>
</html>
