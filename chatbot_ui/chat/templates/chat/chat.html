<!DOCTYPE html>
<html>
<head>
    <title>Funny ChatBot</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            width: 600px;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 75%;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 18px;
            animation: fadeIn 0.3s ease forwards;
            word-wrap: break-word;
        }

        .user {
            align-self: flex-end;
            background: linear-gradient(135deg, #4f8cff, #2563eb);
        }

        .bot {
            align-self: flex-start;
            background: #2f3542;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .typing {
            font-style: italic;
            opacity: 0.7;
        }

        .typing::after {
            content: '';
            animation: dots 1.5s steps(3, end) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }

        form {
            margin-top: 15px;
            display: flex;
        }

        input {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #1e293b;
            color: white;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 14px 20px;
            border-radius: 12px;
            border: none;
            background: #2563eb;
            color: white;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Scrollbar */
        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: #2563eb;
            border-radius: 10px;
        }

    </style>
</head>

<body>

<div class="container">
    <h2>🤖 Funny ChatBot</h2>

    <div class="chat-box" id="chat-box">
        {% for msg in messages %}
            {% if msg.role == "user" %}
                <div class="message user">{{ msg.message }}</div>
            {% else %}
                <div class="message bot">{{ msg.message }}</div>
            {% endif %}
        {% endfor %}
    </div>

    <form id="chat-form">
        <input type="text" id="message-input" placeholder="Ask something funny..." required>
        <button type="submit" id="send-btn">Send</button>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("chat-form");
    const input = document.getElementById("message-input");
    const chatBox = document.getElementById("chat-box");
    const sendBtn = document.getElementById("send-btn");

    // Auto scroll on load
    chatBox.scrollTop = chatBox.scrollHeight;

    function addMessage(text, type, isTyping=false) {
        const msg = document.createElement("div");
        msg.classList.add("message", type);

        if (isTyping) {
            msg.classList.add("typing");
        }

        msg.innerText = text;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msg;
    }

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        const message = input.value.trim();
        if (!message) return;

        addMessage(message, "user");
        input.value = "";
        sendBtn.disabled = true;

        const typingIndicator = addMessage("Bot is typing", "bot", true);

        // change this to fetch("/chat/") to run in local
        fetch("https://chat-bot-jrpl.onrender.com/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                // "X-CSRFToken": getCookie("csrftoken")
            },
            body: JSON.stringify({
                user_id: "user123",
                question: message
            })
        })
        .then(response => response.json())
        .then(data => {

            typingIndicator.remove();
            addMessage(data.response, "bot");

        })
        .catch(error => {
            typingIndicator.remove();
            addMessage("Oops! Something went wrong 😅", "bot");
        })
        .finally(() => {
            sendBtn.disabled = false;
        });
    });

    // Send on Enter key
    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            form.dispatchEvent(new Event("submit"));
        }
    });

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
            const cookies = document.cookie.split(";");
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.substring(0, name.length + 1) === (name + "=")) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

});
</script>

</body>
</html>
